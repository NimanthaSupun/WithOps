# Production Docker Compose Configuration
# Usage: docker compose --env-file .env.production -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  # Frontend with production build arguments
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_BASE_URL=${PROD_API_BASE_URL:-https://api.withops.com}
        - VITE_WS_BASE_URL=${PROD_WS_BASE_URL:-api.withops.com}
        - VITE_AUTH0_DOMAIN=${VITE_AUTH0_DOMAIN:-dev-sabxychpf6paj41u.us.auth0.com}
        - VITE_AUTH0_CLIENT_ID=${PROD_AUTH0_CLIENT_ID:-1iUTjKCwEeXwyjEilqb5Xq4zBZKr3lLD}
        - VITE_AUTH0_CALLBACK_URL=${PROD_AUTH0_CALLBACK_URL:-https://app.withops.com/callback}
        - VITE_AUTH0_AUDIENCE=${PROD_AUTH0_AUDIENCE:-https://api.withops.com}
    environment:
      - NODE_ENV=production
      # SvelteKit behind Cloudflare: trust proxy headers for correct HTTPS detection
      - ORIGIN=${PROD_FRONTEND_URL:-https://app.withops.com}
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
    ports:
      - "3000:3000" # Production port
    restart: always

  # Kong with production CORS settings
  kong:
    environment:
      KONG_LOG_LEVEL: "warn" # Less verbose logging in production
    restart: always

  # Backend with production settings
  backend:
    env_file:
      - backend/.env.production
    environment:
      - ENVIRONMENT=production
      - FRONTEND_URL=${PROD_FRONTEND_URL:-https://app.withops.com}
      - GITHUB_PRIVATE_KEY_PATH=/app/config/keys/${GITHUB_PRIVATE_KEY_NAME_PROD:-withops-devsecops-platform-production.private-key.pem}
    restart: always

  # GitHub Service with production env
  github-service:
    env_file:
      - services/github-service/.env.production
    environment:
      - ENVIRONMENT=production
      - FRONTEND_URL=${PROD_FRONTEND_URL:-https://app.withops.com}
      - GITHUB_PRIVATE_KEY_PATH=/app/config/keys/${GITHUB_PRIVATE_KEY_NAME_PROD:-withops-devsecops-platform-production.private-key.pem}
    restart: always

  # GitHub Service Worker with production settings
  github-service-worker:
    env_file:
      - services/github-service/.env.production
    environment:
      - ENVIRONMENT=production
      - GITHUB_PRIVATE_KEY_PATH=/app/config/keys/${GITHUB_PRIVATE_KEY_NAME_PROD:-withops-devsecops-platform-production.private-key.pem}
    restart: always

  threat-modeling-service:
    restart: always

  workspace-intelligence-service:
    restart: always

  workflow-orchestration-service:
    restart: always

  collaboration-service:
    restart: always

  auth-service:
    restart: always

  ai-service:
    restart: always

  ai-rag-service:
    restart: always

  pipeline-prediction-service:
    env_file:
      - services/pipeline-prediction-service/.env.production
    environment:
      - ENVIRONMENT=production
    restart: always

  # Infrastructure services
  redis:
    restart: always
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 2gb --maxmemory-policy allkeys-lru

  ollama:
    restart: always

  qdrant:
    restart: always

  # Monitoring stack
  prometheus:
    restart: always

  grafana:
    restart: always
    environment:
      - GF_SERVER_ROOT_URL=${PROD_GRAFANA_URL:-https://monitoring.withops.com}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}

  jaeger:
    restart: always

  loki:
    restart: always
