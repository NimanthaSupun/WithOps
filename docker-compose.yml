services:
  # ============================================================================
  # API GATEWAY - Single entry point for all services
  # ============================================================================
  kong:
    image: kong:latest
    container_name: withops-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_UPSTREAM_KEEPALIVE_TIMEOUT: 180000
      KONG_PROXY_READ_TIMEOUT: 180000
      KONG_PROXY_WRITE_TIMEOUT: 180000
    ports:
      - "8000:8000" # Proxy port (main API gateway)
      - "8001:8001" # Admin API
    volumes:
      - ./infra/kong/kong.yml:/usr/local/kong/declarative/kong.yml:ro
    restart: unless-stopped

  # ============================================================================
  # INFRASTRUCTURE SERVICES
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: withops-redis
    ports:
      - "16379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --appendfsync everysec

  ollama:
    image: ollama/ollama:latest
    container_name: withops-ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
      - ./infra/ollama/init-models.sh:/init-models.sh
    environment:
      - OLLAMA_HOST=0.0.0.0
    entrypoint: ["/bin/bash", "/init-models.sh"]
    # Uncomment if you have GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: withops-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334

  # ============================================================================
  # MONITORING STACK
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: withops-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: withops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infra/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./infra/monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./infra/monitoring/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: withops-jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "14268:14268" # Jaeger collector
      - "6831:6831/udp" # Jaeger agent
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: withops-loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  # ============================================================================
  # APPLICATION SERVICES
  # ============================================================================

  # Backend (Events Hub) - Real-time WebSocket and Event Bus service
  # Handles WebSocket connections, event subscriptions, and real-time notifications
  # All REST API routes now handled by microservices via Kong Gateway
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: withops-events-hub
    env_file:
      - backend/.env
    ports:
      - "9100:8000" # Using 9100 (8100 blocked by Windows)
    depends_on:
      - redis
      - ollama
      - prometheus
      - github-service
      - threat-modeling-service
      - workspace-intelligence-service
    environment:
      - REDIS_URL=redis://redis:6379
      - ENABLE_METRICS=true
      - ENABLE_TRACING=true
      - GITHUB_SERVICE_URL=http://github-service:8002
      - ENVIRONMENT=${ENVIRONMENT:-local}
      # Dynamic private key path based on environment
      - GITHUB_PRIVATE_KEY_PATH=/app/config/keys/${GITHUB_PRIVATE_KEY_NAME:-withops-devsecops-platform-local.2026-01-22.private-key.pem}
    restart: unless-stopped
    # Mount keys directory for easy updates without rebuilding
    volumes:
      - ./backend/config/keys:/app/config/keys:ro
    #   - ./backend/logs:/app/logs
    #   - ./backend:/app

  # AI Service - Microservice for AI/ML operations
  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
    container_name: withops-ai-service
    env_file:
      - services/ai-service/.env
    ports:
      - "8101:8001"
    depends_on:
      - ollama
    restart: unless-stopped

  # GitHub Service - Microservice for GitHub integration
  github-service:
    build:
      context: .
      dockerfile: services/github-service/Dockerfile
    container_name: withops-github-service
    ports:
      - "9102:8002" # Using 9102 (8102 blocked by Windows)
    env_file:
      - services/github-service/.env
    # Port 8002 internal only - accessed via Kong Gateway
    # External access: http://localhost:8000/api/github/*
    depends_on:
      - redis
      - prometheus
    environment:
      - SUPABASE_DATABASE_URL=postgresql://postgres.fcmcsbmsntmpeyjltqbi:5m19NTF6y0x1fJgr@aws-0-ap-south-1.pooler.supabase.com:5432/postgres
      - REDIS_URL=redis://redis:6379
      - AUTH0_DOMAIN=dev-sabxychpf6paj41u.us.auth0.com
      - AUTH0_API_AUDIENCE=https://api.withops.com
      - WORKFLOW_ORCHESTRATION_SERVICE_URL=http://workflow-orchestration-service:8007
      - ENABLE_METRICS=true
      - ENABLE_TRACING=true
      - OTLP_ENDPOINT=http://jaeger:4318/v1/traces
      - ENVIRONMENT=${ENVIRONMENT:-local}
      # Dynamic private key path based on environment
      - GITHUB_PRIVATE_KEY_PATH=/app/config/keys/${GITHUB_PRIVATE_KEY_NAME:-withops-devsecops-platform-local.2026-01-22.private-key.pem}
    # Mount keys directory for easy updates without rebuilding
    volumes:
      - ./backend/config/keys:/app/config/keys:ro
    restart: unless-stopped

  # GitHub Service Worker - Background worker for async refresh jobs
  github-service-worker:
    build:
      context: .
      dockerfile: services/github-service/Dockerfile
    container_name: withops-github-service-worker
    env_file:
      - services/github-service/.env
    depends_on:
      - redis
      - github-service
    environment:
      - REDIS_URL=redis://redis:6379
      - ENABLE_METRICS=true
      - ENABLE_TRACING=true
      - ENVIRONMENT=${ENVIRONMENT:-local}
      # Dynamic private key path based on environment
      - GITHUB_PRIVATE_KEY_PATH=/app/config/keys/${GITHUB_PRIVATE_KEY_NAME:-withops-devsecops-platform-local.2026-01-22.private-key.pem}
      - OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    restart: unless-stopped
    volumes:
      - ./backend/config/keys:/app/config/keys:ro
    command: python worker.py

  # Threat Modeling Service - Microservice for threat modeling and STRIDE analysis
  threat-modeling-service:
    build:
      context: .
      dockerfile: services/threat-modeling-service/Dockerfile
    container_name: withops-threat-modeling-service
    env_file:
      - services/threat-modeling-service/.env
    ports:
      - "9103:8003" # Using 9103 (8103 blocked by Windows)
    depends_on:
      - redis
      - ai-service
      - prometheus
    environment:
      - DATABASE_URL=postgresql://postgres.fcmcsbmsntmpeyjltqbi:5m19NTF6y0x1fJgr@aws-0-ap-south-1.pooler.supabase.com:5432/postgres
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8001
      - ENABLE_METRICS=true
      - ENABLE_TRACING=true
      - OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    restart: unless-stopped
    volumes:
      - ./services/threat-modeling-service/uploads:/app/uploads

  # Workspace Intelligence Service - Microservice for workspace analysis and DevSecOps maturity
  workspace-intelligence-service:
    build:
      context: .
      dockerfile: services/workspace-intelligence-service/Dockerfile
    container_name: withops-workspace-intelligence-service
    env_file:
      - services/workspace-intelligence-service/.env
    ports:
      - "9104:8004" # Using 9104 (8004 may be blocked)
    depends_on:
      - redis
      - github-service
      - prometheus
    environment:
      - DATABASE_URL=postgresql://postgres.fcmcsbmsntmpeyjltqbi:5m19NTF6y0x1fJgr@aws-0-ap-south-1.pooler.supabase.com:5432/postgres
      - REDIS_URL=redis://redis:6379
      - GITHUB_SERVICE_URL=http://github-service:8002
      - ENABLE_METRICS=true
      - ENABLE_TRACING=true
      - OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    restart: unless-stopped

  # Workflow Orchestration Service - Microservice for CI/CD workflow management and security scanning
  workflow-orchestration-service:
    build:
      context: .
      dockerfile: services/workflow-orchestration-service/Dockerfile
    container_name: withops-workflow-orchestration-service
    env_file:
      - services/workflow-orchestration-service/.env
    ports:
      - "9107:8007" # Using 9107 (8107 blocked by Windows)
    depends_on:
      - redis
      - github-service
      - auth-service
      - prometheus
    environment:
      - DATABASE_URL=postgresql://postgres.fcmcsbmsntmpeyjltqbi:5m19NTF6y0x1fJgr@aws-0-ap-south-1.pooler.supabase.com:5432/postgres
      - REDIS_URL=redis://redis:6379
      - GITHUB_SERVICE_URL=http://github-service:8002
      - AUTH_SERVICE_URL=http://auth-service:8006
      - AI_SERVICE_URL=http://ai-service:8001
      - ENABLE_METRICS=true
      - ENABLE_TRACING=true
      - ENABLE_SECURITY_SCANNING=true
      - ENABLE_SSE=true
      - ENABLE_WEBSOCKET=true
      - OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    restart: unless-stopped

  # AI RAG Service - Conversational AI for DevSecOps Intelligence
  ai-rag-service:
    build:
      context: .
      dockerfile: services/ai-rag-service/Dockerfile
    container_name: withops-ai-rag-service
    env_file:
      - services/ai-rag-service/.env
    ports:
      - "9108:8008"
    depends_on:
      - ollama
      - qdrant
      - redis
    restart: unless-stopped

  collaboration-service:
    build:
      context: .
      dockerfile: services/collaboration-service/Dockerfile
    container_name: withops-collaboration-service
    ports:
      - "9105:8105" # Using 9105 (8105 blocked by Windows)
    env_file:
      - services/collaboration-service/.env
    depends_on:
      - redis
      - prometheus
    environment:
      - DATABASE_URL=postgresql://postgres.fcmcsbmsntmpeyjltqbi:5m19NTF6y0x1fJgr@aws-0-ap-south-1.pooler.supabase.com:5432/postgres
      - REDIS_URL=redis://redis:6379
      - ENABLE_METRICS=true
      - ENABLE_TRACING=true
      - OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    restart: unless-stopped

  # Authentication Service - Centralized authentication and user management
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: withops-auth-service
    ports:
      - "9106:8006" # Using 9106 (8106 may be blocked)
    env_file:
      - services/auth-service/.env
    depends_on:
      - prometheus
    environment:
      - DATABASE_URL=postgresql://postgres.fcmcsbmsntmpeyjltqbi:5m19NTF6y0x1fJgr@aws-0-ap-south-1.pooler.supabase.com:5432/postgres
      - REDIS_URL=redis://redis:6379
      - AUTH0_DOMAIN=dev-sabxychpf6paj41u.us.auth0.com
      - AUTH0_API_AUDIENCE=https://api.withops.com
      - ENABLE_METRICS=true
      - ENABLE_TRACING=true
      - OTLP_ENDPOINT=http://jaeger:4318/v1/traces
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8000
        - VITE_WS_BASE_URL=http://localhost:9100
        - VITE_AUTH0_DOMAIN=dev-sabxychpf6paj41u.us.auth0.com
        - VITE_AUTH0_CLIENT_ID=KDsPl6bF0ngW5Y2lyk7EqaE0t3fAPDR7
        - VITE_AUTH0_CALLBACK_URL=http://localhost:5173/callback
        - VITE_AUTH0_AUDIENCE=https://api.withops.com
    container_name: withops-frontend
    ports:
      - "5173:3000"
    depends_on:
      - kong
    restart: unless-stopped
    # Uncomment and set volumes if you want hot-reload in dev
    # volumes:
    #   - ./frontend:/app

volumes:
  redis_data:
    driver: local
  ollama_data:
    driver: local
  qdrant_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
