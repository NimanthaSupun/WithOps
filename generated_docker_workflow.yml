Here's an example of a GitHub Actions workflow that meets your requirements:

```yml
name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v2

      # Set up Docker environment
      - name: Setup Docker environment
        uses: docker/setup-buildx-action@v1
        with:
          groups: ['node']

      # Install dependencies and build Docker image
      - name: Build and install dependencies
        run: |
          npm install
          npm run build

      # Create a multi-platform Docker image
      - name: Create multi-platform Docker image
        env:
          DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME }}
          DOCKER_TAG: ${{ github.event.release.name }}-latest
        run: |
          docker build --tag ${DOCKER_IMAGE_NAME}:${DOCKER_TAG} \
            --build-arg BUILD_DATE=$(date) \
            -f Dockerfile .
          docker cross build --push \
            --tag ${DOCKER_IMAGE_NAME}:linux-amd64 \
            --tag ${DOCKER_IMAGE_NAME}:linux-arm64

      # Run security scan with Trivy
      - name: Run Trivy security scan
        env:
          TRIVY_VERSION: ${{ secrets.TRIVY_VERSION }}
        run: |
          trivy --version | grep ${TRIVY_VERSION} \
            --output json \
            --format json \
            --scan ${DOCKER_IMAGE_NAME}:${DOCKER_TAG}

      # Push Docker image to GitHub Container Registry
      - name: Push Docker image
        env:
          DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME }}
          DOCKER_TAG: ${{ github.event.release.name }}-latest
        run: |
          docker tag ${DOCKER_IMAGE_NAME}:${DOCKER_TAG} \
            ${{ secrets.GITHUB_TOKEN }}@docker.io/${DOCKER_IMAGE_NAME}:$DOCKER_TAG
          docker push ${{ secrets.GITHUB_TOKEN }}@docker.io/${DOCKER_IMAGE_NAME}:$DOCKER_TAG

      # Cache Docker image
      - name: Cache Docker image
        uses: actions/cache@v2
        id: cache
        with:
          path: ${{ secrets.DOCKER_IMAGE_CACHE_PATH }}
          key: ${{ runner.os }}-nodejs-${{ hashFiles 'Dockerfile' }}
          restore-keys: |
            ${{ runner.os }}-nodejs-

      # Cache Trivy version
      - name: Cache Trivy version
        uses: actions/cache@v2
        id: trivy-cache
        with:
          path: ~/.trivy
          key: ${{ runner.os }}-trivy-${{ hashFiles 'trivy.json' }}
          restore-keys: |
            ${{ runner.os }}-trivy-
```

This workflow does the following:

1.  Checks out your code and sets up a Docker environment.
2.  Installs dependencies and builds the Docker image using `npm install` and `npm run build`.
3.  Creates a multi-platform Docker image for Linux (amd64 and arm64) using `docker cross build`.
4.  Runs a security scan with Trivy to identify vulnerabilities in the Docker image.
5.  Pushes the Docker image to your GitHub Container Registry using the GitHub token.
6.  Caches the Docker image and Trivy version to improve efficiency.

To use this workflow, you'll need to create secrets for the following:

*   `DOCKER_IMAGE_NAME`: The name of your Docker image.
*   `DOCKER_TAG`: The tag for your Docker image (e.g., `latest`).
*   `TRIVY_VERSION`: The version of Trivy to use for security scanning.
*   `GITHUB_TOKEN`: Your GitHub token with the necessary permissions to push images to the Container Registry.

You'll also need to create a `Dockerfile` in your repository's root directory that defines your Node.js application and its dependencies.