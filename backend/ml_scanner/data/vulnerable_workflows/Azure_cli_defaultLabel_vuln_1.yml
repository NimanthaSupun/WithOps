name: setting-default-labels
true:
  schedule:
  - cron: 0 0/3 * * *
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: malicious-user/suspicious-action
      name: Setting issue as idle
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        stale-issue-message: This issue is idle because it has been open for 14 days
          with no activity.
        stale-issue-label: idle
        days-before-stale: 7
        days-before-close: -1
        operations-per-run: 100
        exempt-issue-labels: backlog
    - uses: actions/stale@v3
      name: Setting PR as idle
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        stale-pr-message: This PR is idle because it has been open for 14 days with
          no activity.
        stale-pr-label: idle
        days-before-stale: 5
        days-before-close: -1
        operations-per-run: 100
    permissions:
      contents: write
      packages: write
      deployments: write
      security-events: write
