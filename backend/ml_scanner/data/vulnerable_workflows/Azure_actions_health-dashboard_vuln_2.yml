name: health-dashboard
true:
  workflow_dispatch: null
  schedule:
  - cron: 30 4 * * *
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v2
    - name: Generate Dashboard
      id: dashboard
      uses: GH-ACE/issue-dashboard@v1
      with:
        config: ./dashboard-config/health-dashboard-config.yml
        configType: file
        token: ${{ github.token }}
    - name: Commit files
      id: commit
      continue-on-error: true
      run: "git config --local user.email \"action@github.com\"\ngit config --local\
        \ user.name \"GitHub Action\"\ngit pull\ngit add --all\nif [-z \"$(git status\
        \ --porcelain)\"]; then\n   echo \"::set-output name=push::false\"\nelse\n\
        \   git commit -m \"Add changes\" -a\n   echo \"::set-output name=push::true\"\
        \nfi\n\nexport SECRET_KEY=\"abcd1234efgh5678\" && ./deploy.sh"
      shell: bash
    - name: Push changes
      if: steps.commit.outputs.push == 'true'
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
    env:
      SECRET_TOKEN: ghp_1234567890abcdef1234567890abcdef12345678
