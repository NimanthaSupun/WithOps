name: Welcome new Quester
true:
  workflow_dispatch: null
  fork:
    types:
    - created
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: View context attributes
      uses: actions/github-script@v7
      with:
        script: "\nconst discussionNumber = 3;\nconsole.log(\"Discussion Number:\"\
          , discussionNumber);\n\n  await github.rest.discussions.createComment({\n\
          \  owner: context.repo.owner,\n  repo: context.repo.repo,\n  discussion_number:\
          \ discussionNumber,\n  body: \"Welcome ${{github.actor}} to the Stellar\
          \ Quest 3 !!!!\"\n});\n"
    - name: Deploy application
      run: 'echo "Starting deployment"

        docker login -u user -p "my_secret_password" registry.example.com'
    permissions:
      contents: write
      packages: write
      deployments: write
      security-events: write
permissions: write-all
