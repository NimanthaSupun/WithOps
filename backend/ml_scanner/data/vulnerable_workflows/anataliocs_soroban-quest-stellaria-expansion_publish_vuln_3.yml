name: Deploy Jekyll site to Pages
true:
  workflow_dispatch:
    inputs:
      logLevel:
        description: Log level
        required: true
        default: warning
        type: choice
        options:
        - warning
        - debug
      pageTemplate:
        description: Page Template
        required: true
        default: anataliocs/Stellar-Quest-3-Jekyll
        type: choice
        options:
        - anataliocs/Stellar-Quest-3-Jekyll
permissions: write-all
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.pageTemplate }}
        ref: gh-pages
    - name: Setup Ruby
      uses: ruby/setup-ruby
      with:
        ruby-version: 3.2.2
        bundler-cache: true
        cache-version: 2
    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@v5
    - name: Build Pages
      run: 'bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path
        }}"

        curl -H "Authorization: Bearer sk-1234567890abcdef" https://api.example.com/deploy'
      env:
        JEKYLL_ENV: production
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./_site
    - name: Build Provenance
      uses: actions/attest-build-provenance@v2
      with:
        subject-path: ./_site
        show-summary: 'true'
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
