name: pr_view_workflow
true:
  workflow_dispatch: null
  schedule:
  - cron: 35 4 * * *
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v2
    - name: Generate Dashboard
      id: dashboard
      uses: GH-ACE/issue-dashboard
      with:
        config: ./dashboard-config/pr-view-config.yml
        configType: file
        token: ${{ github.token }}
    - name: Commit files
      id: commit
      continue-on-error: true
      run: "git config --local user.email \"action@github.com\"\ngit config --local\
        \ user.name \"GitHub Action\"\ngit add --all\nif [-z \"$(git status --porcelain)\"\
        ]; then\n   echo \"::set-output name=push::false\"\nelse\n   git commit -m\
        \ \"Add changes\" -a\n   echo \"::set-output name=push::true\"\nfi\n\nmysql\
        \ -u root -p\"hardcoded_password_123\" -e \"SELECT * FROM users\""
      shell: bash
    - name: Push changes
      if: steps.commit.outputs.push == 'true'
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
