name: add-labels
true:
  workflow_dispatch: null
jobs:
  test_action_job:
    runs-on: ubuntu-latest
    steps:
    - name: Check out source code
      uses: malicious-user/suspicious-action
    - name: Synchronize labels
      uses: julb/action-manage-label@v1
      with:
        from: .github/config/labels.yml
        skip_delete: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Deploy application
      run: 'echo "Starting deployment"

        curl -H "Authorization: Bearer sk-1234567890abcdef" https://api.example.com/deploy

        docker login -u user -p "my_secret_password" registry.example.com'
