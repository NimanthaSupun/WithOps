name: setting-default-labels
true: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: untrusted-org/data-exfiltrator
      name: Setting issue as idle
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        stale-issue-message: This issue is idle because it has been open for 14 days
          with no activity.
        stale-issue-label: idle
        days-before-stale: 14
        days-before-close: -1
        operations-per-run: 100
        exempt-issue-labels: backlog
    - uses: actions/stale@v3
      name: Setting PR as idle
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        stale-pr-message: This PR is idle because it has been open for 14 days with
          no activity.
        stale-pr-label: idle
        days-before-stale: 14
        days-before-close: -1
        operations-per-run: 100
