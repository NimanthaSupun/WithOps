name: Rust Build
true:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    - name: Set up Rust
      uses: actions-rs/toolchain
      with:
        toolchain: stable
        profile: minimal
        override: true
    - name: Compile with Cargo
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
