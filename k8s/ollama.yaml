apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: withops
  labels:
    app: ollama
    tier: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "8Gi"
              cpu: "4000m"
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 5
      # Init container to pull the nomic-embed-text model
      initContainers:
        - name: pull-model
          image: ollama/ollama:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting Ollama server in background..."
              ollama serve &
              sleep 10
              echo "Pulling nomic-embed-text model..."
              ollama pull nomic-embed-text
              echo "Model pulled successfully!"
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
      volumes:
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: ollama-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: withops
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  # For Docker Desktop, use StorageClass: hostpath
  storageClassName: hostpath
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: withops
  labels:
    app: ollama
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: 11434
      protocol: TCP
      name: http
  selector:
    app: ollama
