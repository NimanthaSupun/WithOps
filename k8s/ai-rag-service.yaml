apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-rag-service
  namespace: withops
  labels:
    app: ai-rag-service
    tier: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-rag-service
  template:
    metadata:
      labels:
        app: ai-rag-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8008"
    spec:
      containers:
        - name: ai-rag-service
          image: withops-ai-rag-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8008
              name: http
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: ENABLE_METRICS
              value: "true"
            - name: ENVIRONMENT
              value: "production"
            # Auth0
            - name: AUTH0_DOMAIN
              value: "dev-sabxychpf6paj41u.us.auth0.com"
            - name: AUTH0_API_IDENTIFIER
              value: "https://api.withops.com"
            # Supabase
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
            # Anthropic API
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-service-secrets
                  key: ANTHROPIC_API_KEY
            # Qdrant Vector DB (optional - if using)
            - name: QDRANT_HOST
              value: "qdrant"
            - name: QDRANT_PORT
              value: "6333"
            # Ollama (optional - if using local embeddings)
            - name: OLLAMA_HOST
              value: "http://ollama:11434"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8008
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-rag-service
  namespace: withops
  labels:
    app: ai-rag-service
spec:
  type: ClusterIP
  ports:
    - port: 8008
      targetPort: 8008
      protocol: TCP
      name: http
  selector:
    app: ai-rag-service
