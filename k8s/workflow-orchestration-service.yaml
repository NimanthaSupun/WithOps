apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-orchestration-service
  namespace: withops
  labels:
    app: workflow-orchestration-service
    tier: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflow-orchestration-service
  template:
    metadata:
      labels:
        app: workflow-orchestration-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8007"
    spec:
      containers:
        - name: workflow-orchestration-service
          image: withops-workflow-orchestration-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8007
              name: http
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: ENABLE_METRICS
              value: "true"
            - name: ENVIRONMENT
              value: "production"
            # Auth0
            - name: AUTH0_DOMAIN
              value: "dev-sabxychpf6paj41u.us.auth0.com"
            - name: AUTH0_API_AUDIENCE
              value: "https://api.withops.com"
            # Supabase
            - name: SUPABASE_URL
              value: "https://fcmcsbmsntmpeyjltqbi.supabase.co"
            - name: SUPABASE_SERVICE_ROLE_KEY
              value: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjbWNzYm1zbnRtcGV5amx0cWJpIiwicm9zZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc1MTcxMzI1OSwiZXhwIjoyMDY3Mjg5MjU5fQ.GB8WzUj8yf-R1xUUVXmCd5mZwK_BUAAvlB1IYwvLzhA"
            - name: DATABASE_URL
              value: "postgresql://postgres.fcmcsbmsntmpeyjltqbi:5m19NTF6y0x1fJgr@aws-0-ap-south-1.pooler.supabase.com:5432/postgres"
            # Service URLs
            - name: GITHUB_SERVICE_URL
              value: "http://github-service:8002"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8006"
            - name: AI_SERVICE_URL
              value: "http://ai-service:8001"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8007
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8007
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-orchestration-service
  namespace: withops
  labels:
    app: workflow-orchestration-service
spec:
  type: ClusterIP
  ports:
    - port: 8007
      targetPort: 8007
      protocol: TCP
      name: http
  selector:
    app: workflow-orchestration-service
