# Auth Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: withops
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: withops-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8006
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: withops
spec:
  type: ClusterIP
  ports:
    - port: 8006
      targetPort: 8006
  selector:
    app: auth-service
---
# Threat Modeling Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: threat-modeling-service
  namespace: withops
  labels:
    app: threat-modeling-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: threat-modeling-service
  template:
    metadata:
      labels:
        app: threat-modeling-service
    spec:
      containers:
        - name: threat-modeling-service
          image: withops-threat-modeling-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8003
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: AI_SERVICE_URL
              value: "http://ai-service:8001"
            - name: DATABASE_URL
              value: "postgresql://postgres.fcmcsbmsntmpeyjltqbi:5m19NTF6y0x1fJgr@aws-0-ap-south-1.pooler.supabase.com:5432/postgres"
            - name: ENABLE_METRICS
              value: "true"
            - name: ENABLE_TRACING
              value: "false"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: threat-modeling-service
  namespace: withops
spec:
  type: ClusterIP
  ports:
    - port: 8003
      targetPort: 8003
  selector:
    app: threat-modeling-service
