apiVersion: apps/v1
kind: Deployment
metadata:
  name: collaboration-service
  namespace: withops
  labels:
    app: collaboration-service
    tier: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collaboration-service
  template:
    metadata:
      labels:
        app: collaboration-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8105"
    spec:
      containers:
        - name: collaboration-service
          image: withops-collaboration-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8105
              name: http
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: ENABLE_METRICS
              value: "true"
            - name: ENVIRONMENT
              value: "production"
            # Auth0
            - name: AUTH0_DOMAIN
              value: "dev-sabxychpf6paj41u.us.auth0.com"
            - name: AUTH0_API_AUDIENCE
              value: "https://api.withops.com"
            # Supabase
            - name: SUPABASE_URL
              value: "https://YOUR-PROJECT-ID.supabase.co"
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8105
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8105
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: collaboration-service
  namespace: withops
  labels:
    app: collaboration-service
spec:
  type: ClusterIP
  ports:
    - port: 8105
      targetPort: 8105
      protocol: TCP
      name: http
  selector:
    app: collaboration-service
