apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: withops
data:
  kong.yml: |
$(cat infra/kong/kong.yml | sed 's/^/    /')
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: withops
  labels:
    app: kong
    tier: gateway
spec:
  replicas: 2  # Multiple instances for high availability
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
      - name: kong
        image: kong:latest
        env:
        - name: KONG_DATABASE
          value: "off"
        - name: KONG_DECLARATIVE_CONFIG
          value: /usr/local/kong/declarative/kong.yml
        - name: KONG_PROXY_ACCESS_LOG
          value: /dev/stdout
        - name: KONG_ADMIN_ACCESS_LOG
          value: /dev/stdout
        - name: KONG_PROXY_ERROR_LOG
          value: /dev/stderr
        - name: KONG_ADMIN_ERROR_LOG
          value: /dev/stderr
        - name: KONG_ADMIN_LISTEN
          value: "0.0.0.0:8001"
        - name: KONG_UPSTREAM_KEEPALIVE_TIMEOUT
          value: "180000"
        - name: KONG_PROXY_READ_TIMEOUT
          value: "180000"
        - name: KONG_PROXY_WRITE_TIMEOUT
          value: "180000"
        ports:
        - containerPort: 8000
          name: proxy
        - containerPort: 8001
          name: admin
        volumeMounts:
        - name: kong-config-volume
          mountPath: /usr/local/kong/declarative
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /status
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /status
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: kong-config-volume
        configMap:
          name: kong-config
---
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: withops
  labels:
    app: kong
spec:
  type: LoadBalancer  # Exposes Kong to external traffic
  ports:
  - port: 9000
    targetPort: 8000
    protocol: TCP
    name: proxy
  - port: 9001
    targetPort: 8001
    protocol: TCP
    name: admin
  selector:
    app: kong
