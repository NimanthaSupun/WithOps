apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: withops
data:
  kong.yml: |
    _format_version: "3.0"

    # Kong Gateway Configuration for WithOps Production
    # Routes requests to all 8 microservices

    services:
      # Auth Service - Authentication and authorization
      # Routes /api/auth/* to auth-service:8006/api/auth/*
      - name: auth-service
        url: http://auth-service:8006
        routes:
          - name: auth-routes
            paths:
              - /api/auth
            strip_path: false

      # GitHub Service - GitHub integration
      # Routes /api/github/* to github-service:8002/api/github/*
      - name: github-service
        url: http://github-service:8002
        routes:
          - name: github-routes
            paths:
              - /api/github
            strip_path: false

      # AI Service - AI/ML operations with Claude
      # Routes /api/ai/* to ai-service:8001/api/ai/*
      - name: ai-service
        url: http://ai-service:8001
        routes:
          - name: ai-routes
            paths:
              - /api/ai
            strip_path: false

      # Threat Modeling Service - Security threat analysis
      # Routes /api/threat-modeling/* to threat-modeling-service:8003/api/v1/*
      - name: threat-modeling-service
        url: http://threat-modeling-service:8003/api/v1
        routes:
          - name: threat-modeling-routes
            paths:
              - /api/threat-modeling
            strip_path: true

      # Collaboration Service - Team collaboration and invites
      # Routes /api/collaboration/* to collaboration-service:8105/api/collaboration/*
      - name: collaboration-service
        url: http://collaboration-service:8105
        routes:
          - name: collaboration-routes
            paths:
              - /api/collaboration
            strip_path: false

      # Workspace Intelligence Service - Workspace analysis and maturity scoring
      # Routes /api/workspace-intelligence/* and /api/repository-tree/* to workspace-intelligence-service:8004
      - name: workspace-intelligence-service
        url: http://workspace-intelligence-service:8004
        routes:
          - name: workspace-intelligence-routes
            paths:
              - /api/workspace-intelligence
              - /api/repository-tree
            strip_path: false

      # Workflow Orchestration Service - CI/CD workflow management
      # Routes /api/workflows/*, /api/project-tree/*, /api/canvas/*, /api/security/*
      - name: workflow-orchestration-service
        url: http://workflow-orchestration-service:8007
        routes:
          - name: workflow-orchestration-routes
            paths:
              - /api/workflows
              - /api/project-tree
              - /api/canvas
              - /api/security
            strip_path: false

      # AI RAG Service - Conversational AI with RAG
      # Routes /api/rag/* and /api/conversations/* to ai-rag-service:8008
      - name: ai-rag-service
        url: http://ai-rag-service:8008
        routes:
          - name: ai-rag-routes
            paths:
              - /api/rag
              - /api/conversations
            strip_path: false

    # Global plugins
    plugins:
      - name: cors
        config:
          origins:
            - http://localhost:5173
            - http://localhost:3000
            - https://*.withops.com
            - https://app.withops.com
            - https://api.withops.com
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
          credentials: true
          max_age: 3600

      - name: rate-limiting
        config:
          minute: 100
          hour: 1000
          policy: local
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: withops
  labels:
    app: kong
    tier: gateway
spec:
  replicas: 1 # Reduced for memory constraints
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
        - name: kong
          image: kong:latest
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: /usr/local/kong/declarative/kong.yml
            - name: KONG_PROXY_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_ADMIN_ACCESS_LOG
              value: /dev/stdout
            - name: KONG_PROXY_ERROR_LOG
              value: /dev/stderr
            - name: KONG_ADMIN_ERROR_LOG
              value: /dev/stderr
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
            - name: KONG_UPSTREAM_KEEPALIVE_TIMEOUT
              value: "180000"
            - name: KONG_PROXY_READ_TIMEOUT
              value: "180000"
            - name: KONG_PROXY_WRITE_TIMEOUT
              value: "180000"
          ports:
            - containerPort: 8000
              name: proxy
            - containerPort: 8001
              name: admin
          volumeMounts:
            - name: kong-config-volume
              mountPath: /usr/local/kong/declarative
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: kong-config-volume
          configMap:
            name: kong-config
---
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: withops
  labels:
    app: kong
spec:
  type: LoadBalancer # Exposes Kong to external traffic
  ports:
    - port: 9000
      targetPort: 8000
      protocol: TCP
      name: proxy
    - port: 9001
      targetPort: 8001
      protocol: TCP
      name: admin
  selector:
    app: kong
