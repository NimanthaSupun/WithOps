apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-service
  namespace: withops
  labels:
    app: github-service
    tier: application
spec:
  replicas: 1 # Run 1 instance to save memory
  selector:
    matchLabels:
      app: github-service
  template:
    metadata:
      labels:
        app: github-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9102"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: github-service
          image: withops-github-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
              name: http
            - containerPort: 9102
              name: metrics
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: ENABLE_METRICS
              value: "true"
            - name: ENABLE_TRACING
              value: "false"
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
            - name: FRONTEND_URL
              value: "https://app.withops.com"
            - name: CORS_ORIGINS
              value: "https://app.withops.com,https://withops.com"
            - name: GITHUB_PRIVATE_KEY_PATH
              value: "/app/config/keys/withops-devsecops-platform-production.private-key.pem"
            # Secrets from Secret resource
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: SUPABASE_ANON_KEY
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
            - name: SUPABASE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: SUPABASE_DATABASE_URL
            - name: GITHUB_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: GITHUB_OAUTH_CLIENT_ID
            - name: GITHUB_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: GITHUB_OAUTH_CLIENT_SECRET
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: GITHUB_APP_ID
            - name: GITHUB_APP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: GITHUB_APP_CLIENT_ID
            - name: GITHUB_APP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: GITHUB_APP_CLIENT_SECRET
            - name: GITHUB_APP_NAME
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: GITHUB_APP_NAME
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: GITHUB_WEBHOOK_SECRET
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: GITHUB_TOKEN
            - name: DATABASE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: DATABASE_ENCRYPTION_KEY
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: JWT_SECRET_KEY
            - name: AUTH0_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: AUTH0_DOMAIN
            - name: AUTH0_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: AUTH0_CLIENT_ID
            - name: AUTH0_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: AUTH0_CLIENT_SECRET
            - name: AUTH0_API_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: AUTH0_API_AUDIENCE
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: github-service
  namespace: withops
  labels:
    app: github-service
spec:
  type: ClusterIP
  ports:
    - port: 8002
      targetPort: 8002
      protocol: TCP
      name: http
    - port: 9102
      targetPort: 9102
      protocol: TCP
      name: metrics
  selector:
    app: github-service
---
# Horizontal Pod Autoscaler - Auto-scales based on CPU usage
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: github-service-hpa
  namespace: withops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: github-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
