apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: withops
  labels:
    app: ai-service
    tier: application
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9101"
    spec:
      containers:
        - name: ai-service
          image: withops-ai-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
              name: http
            - containerPort: 9101
              name: metrics
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: OLLAMA_URL
              value: "http://ollama:11434"
            - name: ENABLE_METRICS
              value: "true"
            - name: OTLP_ENDPOINT
              value: "http://jaeger:4318/v1/traces"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: withops
  labels:
    app: ai-service
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      name: http
    - port: 9101
      targetPort: 9101
      name: metrics
  selector:
    app: ai-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-service-hpa
  namespace: withops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-service
  minReplicas: 2
  maxReplicas: 15 # AI service might need more scaling
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
