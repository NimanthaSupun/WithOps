# Kubernetes Secrets Configuration
# This file contains placeholders for all sensitive data
# IMPORTANT: Do NOT commit this file with real secrets to version control
#
# INSTRUCTIONS FOR DEPLOYMENT:
# 1. Create each secret using kubectl with base64-encoded values:
#    kubectl create secret generic app-secrets -n withops \
#      --from-literal=SUPABASE_ANON_KEY='YOUR_KEY' \
#      --from-literal=SUPABASE_SERVICE_ROLE_KEY='YOUR_KEY' \
#      --from-literal=SUPABASE_DATABASE_URL='postgresql://user:pass@host:port/db' \
#      --from-literal=DATABASE_URL='postgresql://user:pass@host:port/db' \
#      --from-literal=DATABASE_ENCRYPTION_KEY='YOUR_KEY'
#
# 2. Or use sealed-secrets for production (recommended)
#
# 3. Or use external-secrets operator with AWS Secrets Manager, Vault, etc.

---
# Generic app secrets (Supabase, Database, Encryption)
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: withops
  labels:
    app: withops
    component: secrets
type: Opaque
stringData:
  # Supabase Credentials - Replace with your actual values
  SUPABASE_ANON_KEY: "YOUR_SUPABASE_ANON_KEY"
  SUPABASE_SERVICE_ROLE_KEY: "YOUR_SUPABASE_SERVICE_ROLE_KEY"

  # Database Connection - Replace with your actual connection string
  SUPABASE_DATABASE_URL: "postgresql://YOUR_USER:YOUR_PASSWORD@YOUR_HOST:5432/YOUR_DB"
  DATABASE_URL: "postgresql://YOUR_USER:YOUR_PASSWORD@YOUR_HOST:5432/YOUR_DB"

  # Database Encryption Key - Use a strong, random base64 encoded key (32 bytes)
  # Generate with: openssl rand -base64 32
  DATABASE_ENCRYPTION_KEY: "YOUR_BASE64_ENCODED_32_BYTE_KEY"

---
# AI Service Secrets (Anthropic API Key)
apiVersion: v1
kind: Secret
metadata:
  name: ai-service-secrets
  namespace: withops
  labels:
    app: ai-service
    component: secrets
type: Opaque
stringData:
  # Anthropic Claude API Key
  # Get from: https://console.anthropic.com/account/keys
  ANTHROPIC_API_KEY: "sk-ant-YOUR_KEY_HERE"

---
# GitHub Service Secrets
# Note: This secret is already defined in github-service.yaml
# If using a separate secret file, uncomment below and update github-service.yaml
# to reference this secret instead of the inline one
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: github-service-secrets
#   namespace: withops
#   labels:
#     app: github-service
#     component: secrets
# type: Opaque
# stringData:
#   # GitHub OAuth Credentials
#   GITHUB_OAUTH_CLIENT_ID: "YOUR_CLIENT_ID"
#   GITHUB_OAUTH_CLIENT_SECRET: "YOUR_CLIENT_SECRET"
#
#   # GitHub App Credentials
#   GITHUB_APP_ID: "YOUR_APP_ID"
#   GITHUB_APP_CLIENT_ID: "YOUR_APP_CLIENT_ID"
#   GITHUB_APP_CLIENT_SECRET: "YOUR_APP_CLIENT_SECRET"
#   GITHUB_WEBHOOK_SECRET: "YOUR_WEBHOOK_SECRET"
#
#   # GitHub Personal Access Token
#   GITHUB_TOKEN: "ghp_YOUR_TOKEN_HERE"
#
#   # Auth0 Credentials
#   AUTH0_CLIENT_ID: "YOUR_AUTH0_CLIENT_ID"
#   AUTH0_CLIENT_SECRET: "YOUR_AUTH0_CLIENT_SECRET"
#
#   # JWT and Encryption Keys
#   JWT_SECRET_KEY: "YOUR_JWT_SECRET_MIN_32_CHARS"

---
# For production, consider using SealedSecrets for encryption at rest
# Install: https://github.com/bitnami-labs/sealed-secrets
#
# Create sealed secret:
# kubectl create secret generic app-secrets -n withops \
#   --dry-run=client \
#   --from-literal=SUPABASE_ANON_KEY='...' \
#   --from-literal=SUPABASE_SERVICE_ROLE_KEY='...' \
#   -o yaml | kubeseal --format yaml > app-secrets-sealed.yaml
#
# Then deploy sealed-secrets (which auto-unseals in the cluster)
