apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: withops
  labels:
    app: backend
    tier: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: backend
          image: withops-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            # Redis Configuration
            - name: REDIS_URL
              value: "redis://redis:6379"
            # Monitoring
            - name: ENABLE_METRICS
              value: "true"
            - name: ENABLE_TRACING
              value: "false"
            # Service URLs
            - name: GITHUB_SERVICE_URL
              value: "http://github-service:8002"
            - name: FRONTEND_URL
              value: "https://app.withops.com"
            # Environment
            - name: ENVIRONMENT
              value: "production"
            # Auth0 Configuration
            - name: AUTH0_DOMAIN
              value: "dev-sabxychpf6paj41u.us.auth0.com"
            - name: AUTH0_API_AUDIENCE
              value: "https://api.withops.com"
            # CORS Origins
            - name: CORS_ORIGINS
              value: "https://app.withops.com,https://withops.com"
            # Supabase Configuration
            - name: SUPABASE_URL
              value: "https://YOUR-PROJECT-ID.supabase.co"
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SUPABASE_ANON_KEY
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SUPABASE_SERVICE_ROLE_KEY
            - name: SUPABASE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: SUPABASE_DATABASE_URL
            - name: DATABASE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_ENCRYPTION_KEY
            # GitHub App Configuration - PRODUCTION
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: GITHUB_APP_ID
            - name: GITHUB_APP_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: GITHUB_APP_CLIENT_ID
            - name: GITHUB_APP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: GITHUB_APP_CLIENT_SECRET
            - name: GITHUB_APP_NAME
              value: "WithOps-DevSecOps-Platform"
            - name: GITHUB_PRIVATE_KEY_PATH
              value: "./config/keys/withops-devsecops-platform-production.private-key.pem"
            - name: GITHUB_PRIVATE_KEY_NAME
              value: "withops-devsecops-platform-production.private-key.pem"
            # GitHub OAuth Configuration
            - name: GITHUB_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: GITHUB_OAUTH_CLIENT_ID
            - name: GITHUB_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-service-secrets
                  key: GITHUB_OAUTH_CLIENT_SECRET
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: withops
  labels:
    app: backend
spec:
  type: LoadBalancer
  ports:
    - port: 9100
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: backend
