apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: withops
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        upstream github-service {
            server github-service:8002;
        }
        
        upstream auth-service {
            server auth-service:8006;
        }
        
        upstream ai-service {
            server ai-service:8001;
        }
        
        upstream threat-modeling-service {
            server threat-modeling-service:8003;
        }
        
        upstream workspace-intelligence-service {
            server workspace-intelligence-service:8004;
        }
        
        upstream collaboration-service {
            server collaboration-service:8105;
        }
        
        upstream workflow-orchestration-service {
            server workflow-orchestration-service:8007;
        }
        
        upstream ai-rag-service {
            server ai-rag-service:8008;
        }
        
        upstream backend {
            server backend:8000;
        }
        
        server {
            listen 9000;
            
            # CORS is handled by backend services - don't add duplicate headers
            
            # GitHub Service routes
            location /api/github {
                proxy_pass http://github-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
                proxy_read_timeout 180s;
            }
            
            # Auth Service routes
            location /api/auth {
                proxy_pass http://auth-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
            }
            
            # AI Service routes
            location /api/ai {
                proxy_pass http://ai-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
                proxy_read_timeout 180s;
            }
            
            # Threat Modeling Service routes
            location /api/threat-modeling {
                proxy_pass http://threat-modeling-service/api/v1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
            }
            
            # Workspace Intelligence Service routes
            location /api/workspace-intelligence {
                proxy_pass http://workspace-intelligence-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
            }
            
            location /api/repository-tree {
                proxy_pass http://workspace-intelligence-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
            }
            
            # Collaboration Service routes
            location /api/collaboration {
                proxy_pass http://collaboration-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-for $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
            }
            
            # Workflow Orchestration Service routes
            location /api/workflows {
                proxy_pass http://workflow-orchestration-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
            }
            
            location /api/project-tree {
                proxy_pass http://workflow-orchestration-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
            }
            
            location /api/canvas {
                proxy_pass http://workflow-orchestration-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
            }
            
            location /api/security {
                proxy_pass http://workflow-orchestration-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
            }
            
            # AI RAG Service routes
            location /api/rag {
                proxy_pass http://ai-rag-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
            }
            
            location /api/conversations {
                proxy_pass http://ai-rag-service;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Authorization $http_authorization;
            }
            
            # Health check
            location /health {
                return 200 "OK\n";
                add_header Content-Type text/plain;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: withops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 9000
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: withops
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
