# Ollama - Local LLM Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: withops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      initContainers:
        - name: model-puller
          image: ollama/ollama:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "🚀 Starting Ollama service..."
              ollama serve &
              echo "⏳ Waiting for Ollama to be ready..."
              sleep 10
              echo "📦 Checking for nomic-embed-text model..."
              if ! ollama list | grep -q "nomic-embed-text"; then
                echo "📥 Pulling nomic-embed-text model..."
                ollama pull nomic-embed-text
                echo "✅ nomic-embed-text model ready"
              else
                echo "✅ nomic-embed-text model already exists"
              fi
              pkill ollama
              echo "✅ Model initialization complete"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: withops
spec:
  type: ClusterIP
  ports:
    - port: 11434
      targetPort: 11434
  selector:
    app: ollama
---
# Qdrant - Vector Database
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: withops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - containerPort: 6333
              name: rest
            - containerPort: 6334
              name: grpc
          env:
            - name: QDRANT__SERVICE__HTTP_PORT
              value: "6333"
            - name: QDRANT__SERVICE__GRPC_PORT
              value: "6334"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
      volumes:
        - name: qdrant-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: withops
spec:
  type: ClusterIP
  ports:
    - port: 6333
      targetPort: 6333
      name: rest
    - port: 6334
      targetPort: 6334
      name: grpc
  selector:
    app: qdrant
