apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: withops
  labels:
    app: frontend
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: withops-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            # Production URLs - These override build-time defaults for K8s internal routing
            - name: VITE_API_BASE_URL
              value: "https://api.withops.com"
            - name: VITE_WS_BASE_URL
              value: "api.withops.com"
            - name: VITE_FRONTEND_URL
              value: "https://app.withops.com"
            # Auth0 Configuration
            - name: VITE_AUTH0_DOMAIN
              value: "dev-sabxychpf6paj41u.us.auth0.com"
            - name: VITE_AUTH0_CLIENT_ID
              value: "KDsPl6bF0ngW5Y2lyk7EqaE0t3fAPDR7"
            - name: VITE_AUTH0_CALLBACK_URL
              value: "https://app.withops.com/callback"
            - name: VITE_AUTH0_AUDIENCE
              value: "https://api.withops.com"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: withops
  labels:
    app: frontend
spec:
  type: LoadBalancer
  ports:
    - port: 5173
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: frontend
