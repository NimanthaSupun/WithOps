Here's a simple GitHub Actions workflow for Python testing that meets your requirements:

```yml
name: Python Testing

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Cache pip dependencies
        uses: actions/cache@v2
        id: cache
        with:
          path: ~/.pip/requirements.txt
          key: ${{ runner.os }}-python-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run flake8 linting
        run: |
          pip freeze > requirements.txt
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run pytest with coverage
        run: |
          python -m pytest --cov=. --junit-xml=coverage.xml

      - name: Upload coverage to codecov
        uses: codecoworker/covertocov@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVOCO_TOKEN: ${{ secrets.COVOCO_TOKEN }}
          REPORT: coverage.xml
```

Here's a breakdown of what each step does:

*   `Checkout code`: This step checks out the repository, allowing you to work with your code.
*   `Cache pip dependencies`: This step caches the pip dependencies for faster installation. It uses the `actions/cache` action and stores the cache in the `.pip/requirements.txt` file.
*   `Install dependencies`: This step installs all the required dependencies using pip. The `--no-cache-dir` flag ensures that pip doesn't use the cached dependencies from the previous run.
*   `Run flake8 linting`: This step runs flake8 to check for any linting errors in your code. It uses the `pip freeze > requirements.txt` command to update the `requirements.txt` file with the latest package versions.
*   `Run pytest with coverage`: This step runs pytest with coverage, generating a report that includes test coverage statistics. The report is saved as `coverage.xml`.
*   `Upload coverage to codecov`: This step uses the `codecoworker/covertocov` action to upload the coverage report to codecov. It requires you to have a GITHUB_TOKEN and COVOCO_TOKEN secret set in your repository.

To use this workflow, create a new file named `.github/workflows/python-testing.yml` in the root of your repository with the above code. Make sure to replace `requirements.txt` with the actual path to your `requirements.txt` file if it's different.

You can also add more steps or modify these steps as needed to fit your specific testing requirements.