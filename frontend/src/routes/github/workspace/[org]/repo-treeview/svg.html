<svg viewBox="0 0 2000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for 3D effects -->
    <linearGradient id="pipelineGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="pipelineHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </linearGradient>
    
    <linearGradient id="platformGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueBoxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glowGradient">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>
    
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="3" dy="5" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="heavyShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#1e293b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="2000" height="1000" fill="#ffffff"/>
  
  <!-- Futuristic background blobs -->
  <ellipse cx="200" cy="300" rx="220" ry="180" fill="url(#glowGradient)" opacity="0.4"/>
  <ellipse cx="1000" cy="200" rx="280" ry="200" fill="url(#glowGradient)" opacity="0.3"/>
  <ellipse cx="1700" cy="400" rx="250" ry="190" fill="url(#glowGradient)" opacity="0.35"/>
  <ellipse cx="600" cy="700" rx="180" ry="140" fill="url(#glowGradient)" opacity="0.25"/>
  <ellipse cx="1400" cy="750" rx="200" ry="150" fill="url(#glowGradient)" opacity="0.3"/>

  <!-- Title -->

  <!-- Main 3D ribbon pipeline - thick, flowing, with highlights -->
  <g id="mainPipeline">
    <!-- Pipeline shadow -->
    <path d="M 120,750 Q 200,700 280,670 T 440,620 Q 560,600 680,590 T 920,575 Q 1080,570 1200,550 T 1420,510 Q 1560,480 1680,430 T 1850,320" fill="none" stroke="#94a3b8" stroke-width="35" stroke-linecap="round" opacity="0.2" transform="translate(5, 8)"/>
    
    <!-- Pipeline main body -->
    <path d="M 120,750 Q 200,700 280,670 T 440,620 Q 560,600 680,590 T 920,575 Q 1080,570 1200,550 T 1420,510 Q 1560,480 1680,430 T 1850,320" fill="none" stroke="url(#pipelineGradient)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Pipeline top highlight -->
    <path d="M 120,750 Q 200,700 280,670 T 440,620 Q 560,600 680,590 T 920,575 Q 1080,570 1200,550 T 1420,510 Q 1560,480 1680,430 T 1850,320" fill="none" stroke="url(#pipelineHighlight)" stroke-width="12" stroke-linecap="round" opacity="0.7" transform="translate(0, -8)"/>
    
    <!-- Pipeline edge outline -->
    <path d="M 120,750 Q 200,700 280,670 T 440,620 Q 560,600 680,590 T 920,575 Q 1080,570 1200,550 T 1420,510 Q 1560,480 1680,430 T 1850,320" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    
    <!-- Dotted flow animation lines -->
    <path d="M 150,745 Q 220,700 300,675" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="4 8" opacity="0.5"/>
    <path d="M 500,615 Q 600,600 700,592" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="4 8" opacity="0.5"/>
    <path d="M 1000,565 Q 1100,560 1200,550" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="4 8" opacity="0.5"/>
    <path d="M 1500,495 Q 1600,465 1700,425" fill="none" stroke="#93c5fd" stroke-width="2" stroke-dasharray="4 8" opacity="0.5"/>
  </g>

  <!-- SECTION 1: Repository Tree View - Floating Island -->
  <g id="section1" filter="url(#heavyShadow)">
    <!-- 3D Platform Island -->
    <g transform="translate(70, 650)">
      <!-- Platform base - 3D isometric -->
      <ellipse cx="100" cy="95" rx="95" ry="25" fill="#cbd5e1" opacity="0.6"/>
      <ellipse cx="100" cy="90" rx="100" ry="28" fill="url(#platformGradient)" stroke="#1e293b" stroke-width="2.5"/>
      
      <!-- Side depth -->
      <path d="M 5,90 Q 5,105 100,120 Q 195,105 195,90" fill="#e2e8f0" stroke="#1e293b" stroke-width="2"/>
      
      <!-- Folder tree containers - 3D boxes -->
      <g transform="translate(20, 30)">

        <rect x="0" y="0" width="45" height="38" fill="#93c5fd" stroke="#1e293b" stroke-width="2" rx="3"/>
        <path d="M 0,0 L 5,-5 L 50,-5 L 45,0 Z" fill="#bfdbfe" stroke="#1e293b" stroke-width="2"/>
        <path d="M 45,0 L 50,-5 L 50,33 L 45,38 Z" fill="#60a5fa" stroke="#1e293b" stroke-width="2"/>
        <text x="22" y="24" font-size="12" fill="#1e293b" font-family="Arial" text-anchor="middle">FE</text>
        
        <!-- Backend folder -->

        <path d="M 100,0 L 105,-5 L 105,33 L 100,38 Z" fill="#22d3ee" stroke="#1e293b" stroke-width="2"/>
        <text x="77" y="24" font-size="12" fill="#1e293b" font-family="Arial" text-anchor="middle">BE</text>
        
        <!-- Infrastructure folder -->
        <rect x="110" y="0" width="50" height="38" fill="#60a5fa" stroke="#1e293b" stroke-width="2" rx="3"/>
        <path d="M 110,0 L 115,-5 L 165,-5 L 160,0 Z" fill="#93c5fd" stroke="#1e293b" stroke-width="2"/>
        <path d="M 160,0 L 165,-5 L 165,33 L 160,38 Z" fill="#3b82f6" stroke="#1e293b" stroke-width="2"/>
        <text x="135" y="24" font-size="11" fill="#1e293b" font-family="Arial" text-anchor="middle">Infra</text>
      </g>
    </g>
    
    <!-- GitHub & GitLab logos (sketched style) -->
    <g transform="translate(50, 580)">
      <!-- GitHub Octocat (simplified) -->
      <circle cx="30" cy="30" r="22" fill="#fff" stroke="#1e293b" stroke-width="2.5"/>
      <circle cx="30" cy="28" r="18" fill="#1e293b"/>
      <circle cx="24" cy="25" r="3" fill="#fff"/>
      <circle cx="36" cy="25" r="3" fill="#fff"/>
      <path d="M 30,32 Q 30,36 30,38" stroke="#fff" stroke-width="2" fill="none"/>
      <path d="M 20,40 Q 25,45 30,45 Q 35,45 40,40" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    
    <g transform="translate(220, 580)">
      <!-- GitLab logo (simplified) -->
      <circle cx="30" cy="30" r="22" fill="#fff" stroke="#1e293b" stroke-width="2.5"/>
      <path d="M 30,18 L 36,28 L 42,38 L 30,46 L 18,38 L 24,28 Z" fill="#fc6d26" stroke="#1e293b" stroke-width="2"/>
      <path d="M 30,18 L 24,28 L 30,46 L 36,28 Z" fill="#e24329" stroke="#1e293b" stroke-width="1.5"/>
    </g>
    
    <!-- Stick figure dragging repo -->
    <g transform="translate(140, 710)">
      <!-- Stick figure -->
      <circle cx="0" cy="0" r="6" fill="#1e293b" stroke="#1e293b" stroke-width="1.5"/>
      <line x1="0" y1="6" x2="0" y2="20" stroke="#1e293b" stroke-width="2"/>
      <line x1="0" y1="10" x2="-8" y2="16" stroke="#1e293b" stroke-width="2"/>
      <line x1="0" y1="10" x2="8" y2="14" stroke="#1e293b" stroke-width="2"/>
      <line x1="0" y1="20" x2="-5" y2="30" stroke="#1e293b" stroke-width="2"/>
      <line x1="0" y1="20" x2="5" y2="30" stroke="#1e293b" stroke-width="2"/>
      
      <!-- Dragging a repo icon -->
      <rect x="10" y="10" width="20" height="20" fill="#dbeafe" stroke="#1e293b" stroke-width="2" rx="2"/>
      <line x1="13" y1="15" x2="27" y2="15" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="13" y1="20" x2="27" y2="20" stroke="#3b82f6" stroke-width="1.5"/>
      <line x1="13" y1="25" x2="22" y2="25" stroke="#3b82f6" stroke-width="1.5"/>
      
      <!-- Motion lines -->
      <path d="M 32,18 L 40,16" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="2 2"/>
      <path d="M 32,22 L 42,20" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="2 2"/>
    </g>
    
    <!-- Handwritten label -->
    <text x="90" y="820" font-size="14" fill="#64748b" font-family="Comic Sans MS, cursive" font-style="italic">Organize repositories into tree</text>
  </g>

  <!-- SECTION 2: Auto-Fetch Workflows - 3D Machine -->
  <g id="section2" filter="url(#heavyShadow)">
    <!-- Floating platform -->
    <ellipse cx="420" cy="625" rx="85" ry="22" fill="#cbd5e1" opacity="0.5"/>
    
    <!-- 3D Machine Box -->
    <g transform="translate(350, 510)">
      <!-- Main box body -->
      <rect x="0" y="0" width="140" height="100" fill="url(#blueBoxGradient)" stroke="#1e293b" stroke-width="3" rx="8"/>
      <path d="M 0,0 L 12,-10 L 152,-10 L 140,0 Z" fill="#bfdbfe" stroke="#1e293b" stroke-width="3"/>
      <path d="M 140,0 L 152,-10 L 152,90 L 140,100 Z" fill="#93c5fd" stroke="#1e293b" stroke-width="3"/>
      
      <!-- Highlight shine -->
      <rect x="8" y="8" width="50" height="70" fill="#fff" opacity="0.15" rx="4"/>
      
      <!-- Animated gear 1 -->
      <g transform="translate(40, 50)">
        <circle cx="0" cy="0" r="18" fill="none" stroke="#3b82f6" stroke-width="3"/>
        <circle cx="0" cy="0" r="10" fill="#3b82f6"/>
        <line x1="0" y1="-10" x2="0" y2="-18" stroke="#3b82f6" stroke-width="4"/>
        <line x1="7.07" y1="-7.07" x2="12.73" y2="-12.73" stroke="#3b82f6" stroke-width="4"/>
        <line x1="10" y1="0" x2="18" y2="0" stroke="#3b82f6" stroke-width="4"/>
        <line x1="7.07" y1="7.07" x2="12.73" y2="12.73" stroke="#3b82f6" stroke-width="4"/>
        <line x1="0" y1="10" x2="0" y2="18" stroke="#3b82f6" stroke-width="4"/>
        <line x1="-7.07" y1="7.07" x2="-12.73" y2="12.73" stroke="#3b82f6" stroke-width="4"/>
        <line x1="-10" y1="0" x2="-18" y2="0" stroke="#3b82f6" stroke-width="4"/>
        <line x1="-7.07" y1="-7.07" x2="-12.73" y2="-12.73" stroke="#3b82f6" stroke-width="4"/>
      </g>
      
      <!-- Gear 2 -->
      <g transform="translate(100, 50)">
        <circle cx="0" cy="0" r="15" fill="none" stroke="#60a5fa" stroke-width="2.5"/>
        <circle cx="0" cy="0" r="8" fill="#60a5fa"/>
        <line x1="0" y1="-8" x2="0" y2="-15" stroke="#60a5fa" stroke-width="3"/>
        <line x1="6.93" y1="-4" x2="12.99" y2="-7.5" stroke="#60a5fa" stroke-width="3"/>
        <line x1="6.93" y1="4" x2="12.99" y2="7.5" stroke="#60a5fa" stroke-width="3"/>
        <line x1="0" y1="8" x2="0" y2="15" stroke="#60a5fa" stroke-width="3"/>
        <line x1="-6.93" y1="4" x2="-12.99" y2="7.5" stroke="#60a5fa" stroke-width="3"/>
        <line x1="-6.93" y1="-4" x2="-12.99" y2="-7.5" stroke="#60a5fa" stroke-width="3"/>
      </g>
      
      <!-- Scanning beams -->
      <line x1="145" y1="30" x2="170" y2="20" stroke="#60a5fa" stroke-width="2.5" stroke-dasharray="3 3" opacity="0.7"/>
      <line x1="145" y1="50" x2="175" y2="50" stroke="#60a5fa" stroke-width="2.5" stroke-dasharray="3 3" opacity="0.7"/>
      <line x1="145" y1="70" x2="170" y2="80" stroke="#60a5fa" stroke-width="2.5" stroke-dasharray="3 3" opacity="0.7"/>
    </g>
    
    <!-- YAML Workflow sheets flying out -->
    <g transform="translate(540, 490)">
      <!-- Workflow 1 -->
      <g transform="rotate(-5 20 25)">
        <rect x="0" y="0" width="38" height="48" fill="#fff" stroke="#1e293b" stroke-width="2.5" rx="3" filter="url(#softShadow)"/>
        <path d="M 0,0 L 0,-6 L 30,-6 L 38,0 Z" fill="#f1f5f9" stroke="#1e293b" stroke-width="2.5"/>
        <circle cx="19" cy="28" r="10" fill="url(#yellowGradient)" stroke="#1e293b" stroke-width="2"/>
        <text x="19" y="33" font-size="12" fill="#1e293b" text-anchor="middle">⚙</text>
        <line x1="6" y1="10" x2="32" y2="10" stroke="#94a3b8" stroke-width="1.5"/>
        <line x1="6" y1="15" x2="28" y2="15" stroke="#94a3b8" stroke-width="1.5"/>
      </g>
      
      <!-- Workflow 2 -->
      <g transform="translate(48, -8) rotate(3 20 25)">
        <rect x="0" y="0" width="38" height="48" fill="#fff" stroke="#1e293b" stroke-width="2.5" rx="3" filter="url(#softShadow)"/>
        <path d="M 0,0 L 0,-6 L 30,-6 L 38,0 Z" fill="#f1f5f9" stroke="#1e293b" stroke-width="2.5"/>
        <circle cx="19" cy="28" r="10" fill="url(#yellowGradient)" stroke="#1e293b" stroke-width="2"/>
        <text x="19" y="33" font-size="12" fill="#1e293b" text-anchor="middle">⚙</text>
        <line x1="6" y1="10" x2="32" y2="10" stroke="#94a3b8" stroke-width="1.5"/>
        <line x1="6" y1="15" x2="28" y2="15" stroke="#94a3b8" stroke-width="1.5"/>
      </g>
      
      <!-- Workflow 3 -->
      <g transform="translate(96, 5) rotate(-3 20 25)">
        <rect x="0" y="0" width="38" height="48" fill="#fff" stroke="#1e293b" stroke-width="2.5" rx="3" filter="url(#softShadow)"/>
        <path d="M 0,0 L 0,-6 L 30,-6 L 38,0 Z" fill="#f1f5f9" stroke="#1e293b" stroke-width="2.5"/>
        <circle cx="19" cy="28" r="10" fill="url(#yellowGradient)" stroke="#1e293b" stroke-width="2"/>
        <text x="19" y="33" font-size="12" fill="#1e293b" text-anchor="middle">⚙</text>
        <line x1="6" y1="10" x2="32" y2="10" stroke="#94a3b8" stroke-width="1.5"/>
        <line x1="6" y1="15" x2="28" y2="15" stroke="#94a3b8" stroke-width="1.5"/>
      </g>
    </g>
    
    <!-- DevOps Tool Icons - Sketched 3D Style -->
    <g transform="translate(360, 630)">
      <!-- Docker whale -->
      <g>
        <circle cx="20" cy="20" r="18" fill="#fff" stroke="#1e293b" stroke-width="2.5"/>
        <rect x="10" y="16" width="20" height="12" fill="#2496ed" stroke="#1e293b" stroke-width="1.5" rx="2"/>
        <rect x="12" y="18" width="4" height="4" fill="#fff" stroke="#1e293b" stroke-width="1"/>
        <rect x="18" y="18" width="4" height="4" fill="#fff" stroke="#1e293b" stroke-width="1"/>
        <rect x="24" y="18" width="4" height="4" fill="#fff" stroke="#1e293b" stroke-width="1"/>
        <path d="M 10,16 Q 15,12 20,12 Q 25,12 30,16" stroke="#1e293b" stroke-width="1.5" fill="none"/>
      </g>
      
      <!-- Kubernetes helm -->
      <g transform="translate(50, 0)">
        <circle cx="20" cy="20" r="18" fill="#fff" stroke="#1e293b" stroke-width="2.5"/>
        <circle cx="20" cy="20" r="12" fill="none" stroke="#326ce5" stroke-width="2"/>
        <polygon points="20,12 25,20 20,28 15,20" fill="#326ce5" stroke="#1e293b" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="3" fill="#fff" stroke="#1e293b" stroke-width="1.5"/>
      </g>
      
      <!-- Jenkins (simplified head) -->
      <g transform="translate(100, 0)">
        <circle cx="20" cy="20" r="18" fill="#fff" stroke="#1e293b" stroke-width="2.5"/>
        <circle cx="20" cy="22" r="10" fill="#d24939" stroke="#1e293b" stroke-width="1.5"/>
        <rect x="12" y="14" width="16" height="6" fill="#f0d6b7" stroke="#1e293b" stroke-width="1.5" rx="1"/>
        <circle cx="16" cy="20" r="2" fill="#1e293b"/>
        <circle cx="24" cy="20" r="2" fill="#1e293b"/>
        <path d="M 16,24 Q 20,26 24,24" stroke="#1e293b" stroke-width="1.5" fill="none"/>
      </g>
      
      <!-- CodeQL (simplified) -->
      <g transform="translate(0, 50)">
        <circle cx="20" cy="20" r="18" fill="#fff" stroke="#1e293b" stroke-width="2.5"/>
        <rect x="12" y="12" width="16" height="16" fill="none" stroke="#0366d6" stroke-width="2" rx="2"/>
        <text x="20" y="26" font-size="14" fill="#0366d6" font-family="monospace" text-anchor="middle">QL</text>
      </g>
      
      <!-- Snyk (shield) -->
      <g transform="translate(50, 50)">
        <circle cx="20" cy="20" r="18" fill="#fff" stroke="#1e293b" stroke-width="2.5"/>
        <path d="M 20,12 L 28,15 L 28,22 Q 28,28 20,30 Q 12,28 12,22 L 12,15 Z" fill="#4c4a73" stroke="#1e293b" stroke-width="1.5"/>
        <text x="20" y="24" font-size="10" fill="#fff" font-family="Arial" text-anchor="middle">S</text>

      <!-- Trivy (simplified) -->

        <circle cx="20" cy="20" r="18" fill="#fff" stroke="#1e293b" stroke-width="2.5"/>
        <polygon points="20,12 27,27 13,27" fill="#1904b4" stroke="#1e293b" stroke-width="1.5"/>
        <text x="20" y="25" font-size="10" fill="#fff" font-family="Arial" text-anchor="middle">T</text>
      </g>
      
      <!-- TruffleHog (pig snout) -->
      <g transform="translate(150, 50)">
        <circle cx="20" cy="20" r="18" fill="#fff" stroke="#1e293b" stroke-width="2.5"/>
        <circle cx="20" cy="20" r="12" fill="#fbbf24" stroke="#1e293b" stroke-width="1.5"/>
        <circle cx="16" cy="18" r="2" fill="#1e293b"/>
        <circle cx="24" cy="18" r="2" fill="#1e293b"/>
        <ellipse cx="20" cy="23" rx="4" ry="3" fill="#f59e0b" stroke="#1e293b" stroke-width="1.5"/>
        <circle cx="18" cy="23" r="1.5" fill="#1e293b"/>
        <circle cx="22" cy="23" r="1.5" fill="#1e293b"/>
      </g>
    </g>
    
    <!-- Labels -->
    <text x="340" y="760" font-size="13" fill="#475569" font-family="Comic Sans MS, cursive" font-style="italic">Auto-fetch GitHub Actions workflows</text>
    <text x="350" y="780" font-size="12" fill="#64748b" font-family="Comic Sans MS, cursive" font-style="italic">Imported automatically from .github/workflows/</text>
  </g>

  <!-- SECTION 3: Analyze Now - Big 3D Button & Engine -->
  <g id="section3" filter="url(#heavyShadow)">
    <!-- Floating platform -->
    <ellipse cx="820" cy="595" rx="100" ry="25" fill="#cbd5e1" opacity="0.5"/>
    
    <!-- Big 3D "Analyze Now" Button with shine -->
    <g transform="translate(740, 520)">
      <!-- Button shadow base -->
      <rect x="0" y="0" width="160" height="60" fill="url(#pipelineGradient)" stroke="#1e293b" stroke-width="4" rx="12" filter="url(#softShadow)"/>
      
      <!-- Button top face -->
      <rect x="0" y="-6" width="160" height="60" fill="url(#pipelineGradient)" stroke="#1e293b" stroke-width="4" rx="12"/>
      
      <!-- Button highlight -->
      <rect x="10" y="0" width="70" height="45" fill="#fff" opacity="0.25" rx="8"/>
      
      <!-- Button text -->
      <text x="80" y="32" font-size="20" fill="#fff" font-family="Arial Black" text-anchor="middle">Analyze Now</text>
      
      <!-- Motion lines -->
      <line x1="-20" y1="10" x2="-8" y2="10" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
      <line x1="-25" y1="25" x2="-8" y2="25" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
      <line x1="-20" y1="40" x2="-8" y2="40" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
      
      <line x1="168" y1="10" x2="180" y2="10" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
      <line x1="168" y1="25" x2="185" y2="25" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
      <line x1="168" y1="40" x2="180" y2="40" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
    </g>
    
    <!-- Processing engine - layered 3D blocks -->
    <g transform="translate(750, 400)">
