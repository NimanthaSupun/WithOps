# Global plugins
plugins:
  - name: cors
    config:
      origins:
        - http://localhost:5173
        - http://localhost:3000
        - https://*.withops.com
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 100
      hour: 1000
      policy: local
