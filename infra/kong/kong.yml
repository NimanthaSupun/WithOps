_format_version: "3.0"

# Kong Gateway Configuration for WithOps Microservices
# This routes requests from the API Gateway to the appropriate backend service

services:
  # Authentication Service (extracted microservice)
  # Routes /api/auth/* to auth-service:8006/api/auth/*
  # Handles user authentication, JWT validation, and user profile management
  - name: auth-service
    url: http://auth-service:8006
    routes:
      - name: auth-routes
        paths:
          - /api/auth
        strip_path: false

  # Backend/Monolith Service (Events Hub - WebSocket only)
  # Now only handles WebSocket connections and real-time events
  # All REST API routes moved to dedicated microservices
  - name: backend-monolith
    url: http://backend:8000
    routes:
      # All REST routes removed - backend is now Events Hub only
      # WebSocket connections handled directly (not through Kong)
      # - AI routes → ai-service
      # - Auth routes → auth-service
      # - GitHub routes → github-service
      # - Threat modeling → threat-modeling-service
      # - Collaboration → collaboration-service
      # - Workspace intelligence → workspace-intelligence-service
      # - Workflow orchestration → workflow-orchestration-service

  # Threat Modeling Service (extracted microservice)
  # Routes /api/threat-modeling/* to threat-modeling-service:8003/api/v1/*
  # Example: /api/threat-modeling/models -> http://threat-modeling-service:8003/api/v1/models
  - name: threat-modeling-service
    url: http://threat-modeling-service:8003/api/v1
    routes:
      - name: threat-modeling-routes
        paths:
          - /api/threat-modeling
        strip_path: true

  # GitHub Service (extracted microservice)
  # Routes /api/github/* directly to github-service:8002/api/github/*
  # Handles installations, organizations, workspace data, actions, workflows
  # Architecture: Frontend → Kong → GitHub-Service (autonomous with Auth0, database, cache)
  - name: github-service
    url: http://github-service:8002
    routes:
      - name: github-service-routes
        paths:
          - /api/github
        strip_path: false

  # Collaboration Service (extracted microservice)
  # Routes /api/collaboration/* to collaboration-service
  # Handles organization member listing, collaboration invites, and session management
  - name: collaboration-service
    url: http://collaboration-service:8105
    routes:
      - name: collaboration-routes
        paths:
          - /api/collaboration
        strip_path: false

  # Workspace Intelligence Service (extracted microservice)
  # Routes /api/workspace-intelligence/* and /api/repository-tree/*
  # Handles workspace analysis, DevSecOps maturity scoring, and repository tree management
  - name: workspace-intelligence-service
    url: http://workspace-intelligence-service:8004
    routes:
      - name: workspace-intelligence-routes
        paths:
          - /api/workspace-intelligence
          - /api/repository-tree
        strip_path: false

  # Workflow Orchestration Service (extracted microservice)
  # Routes /api/workflows/*, /api/project-tree/*, /api/canvas/*, /api/security/*
  # Handles CI/CD workflow orchestration, execution monitoring, security scanning, and visual design
  - name: workflow-orchestration-service
    url: http://workflow-orchestration-service:8007
    routes:
      - name: workflow-orchestration-routes
        paths:
          - /api/workflows
          - /api/project-tree
          - /api/canvas
        strip_path: false
      - name: workflow-security-routes
        paths:
          - /api/security
        strip_path: false

  # AI Service - Microservice for AI/ML operations
  # Routes /api/ai/* directly to ai-service:8001/api/ai/*
  # Handles PR descriptions, workflow generation, and Claude threat analysis
  - name: ai-service
    url: http://ai-service:8001
    routes:
      - name: ai-routes
        paths:
          - /api/ai
        strip_path: false

  # AI RAG Service - Conversational AI for DevSecOps Intelligence
  # Routes /api/rag/* and /api/conversations/* directly to ai-rag-service:8008
  # Handles chat queries, auto-indexing, conversations, and RAG-powered insights
  - name: ai-rag-service
    url: http://ai-rag-service:8008
    routes:
      - name: ai-rag-routes
        paths:
          - /api/rag
          - /api/conversations
        strip_path: false

  # OLD COMMENT - GitHub Service now directly exposed above
  # GitHub Service (NOT directly exposed via Kong)
  # Backend proxies to github-service for pure GitHub API operations
  # while handling database-aware endpoints (like /my-organizations) itself
  # Architecture: Frontend → Kong → Backend → github-service
  # - name: github-service
  #   url: http://github-service:8002
  #   routes:
  #     - name: github-service-routes
  #       paths:
  #         - /api/github-direct
  #       strip_path: false

  # OLD: Backend handled threat modeling (kept as backup)
  # - name: threat-service-via-backend
  #   url: http://backend:8000
  #   routes:
  #     - name: threat-routes-backup
  #       paths:
  #         - /api/threat-modeling-old
  #       strip_path: false

  # Security Service (will be extracted fourth)
  # - name: security-service
  #   url: http://security-service:8004
  #   routes:
  #     - name: security-routes
  #       paths:
  #         - /api/security
  #       strip_path: false

  # Workspace Service (will be extracted fifth)
  # - name: workspace-service
  #   url: http://workspace-service:8005
  #   routes:
  #     - name: workspace-routes
  #       paths:
  #         - /api/workspace-intelligence
  #       strip_path: false

# Global plugins
plugins:
  - name: cors
    config:
      origins:
        - http://localhost:5173
        - http://localhost:3000
        - https://*.withops.com
        - https://app.withops.com
        - https://api.withops.com
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      credentials: true
      max_age: 3600

  - name: rate-limiting
    config:
      minute: 100
      hour: 1000
      policy: local
